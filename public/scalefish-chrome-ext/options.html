<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scalefish 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f8;
      color: #333;
      padding: 40px 24px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #1a1a1a; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      color: #333;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #8562F0; }
    input::placeholder { color: #aaa; }
    .hint { font-size: 11px; color: #888; margin-top: 4px; }
    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary { background: #8562F0; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      margin-top: 16px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    #status.success { display: block; background: rgba(80,200,120,0.12); color: #50c878; border: 1px solid rgba(80,200,120,0.2); }
    #status.error { display: block; background: rgba(255,80,80,0.12); color: #ff5050; border: 1px solid rgba(255,80,80,0.2); }
    .success-msg { border: 1px solid rgba(80,200,120,0.3); }
  </style>
</head>
<body>
  <h1>Scalefish 设置</h1>
  <div class="field">
    <label>后端地址</label>
    <input id="backendUrl" type="url" placeholder="例如: http://localhost:8899/api" />
    <div class="hint">Scalefish 后端 API 地址，例如 http://localhost:8899/api</div>
  </div>
  <div class="field">
    <label>API Token</label>
    <input id="apiToken" type="password" placeholder="在 Scalefish → Token 页面创建" />
    <div class="hint">在 Scalefish 后台的 Token 页面创建并复制到这里</div>
  </div>
  <div class="field">
    <label>主页 URL</label>
    <input id="homeUrl" type="url" placeholder="例如: https://scalefish.example.com" />
    <div class="hint">点击扩展图标时跳转的主页地址，留空则不显示跳转</div>
  </div>
  <button id="saveBtn" class="btn-primary">保存</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
