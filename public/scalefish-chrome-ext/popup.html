<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>保存到 Scalefish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f8;
      color: #333;
      padding: 16px;
    }
    h2 { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    h2 span { background: linear-gradient(135deg, #8562F0, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 .logo-link { cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    h2 .logo-link:hover { opacity: 0.8; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; font-weight: 500; }
    .input-like {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #e0e0e0;
      color: #333;
      font-size: 12px;
      word-break: break-all;
      line-height: 1.4;
    }
    .url-box { color: #999; font-size: 11px; margin-top: 2px; }
    select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #ddd;
      color: #333;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #8562F0; }
    select option { background: #fff; color: #333; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; max-height: 120px; overflow-y: auto; padding: 2px 0; }
    .tags label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border-radius: 12px;
      background: #f0f0f4;
      border: 1px solid #e0e0e0;
      font-size: 11px;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 400;
    }
    .tags label:hover { border-color: rgba(133,98,240,0.4); color: #333; }
    .tags input { display: none; }
    .tags input:checked + span { color: #a78bfa; }
    .tags label:has(input:checked) {
      background: rgba(133,98,240,0.08);
      border-color: rgba(133,98,240,0.3);
      color: #8562F0;
    }
    .actions { display: flex; gap: 8px; margin-top: 14px; }
    button {
      flex: 1;
      padding: 9px 0;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save { background: #8562F0; color: #fff; }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-config { background: #e8e8ee; color: #666; }
    .btn-config:hover { background: #ddd; color: #444; }
    #status {
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
    }
    #status.loading { display: block; background: #f0f0f4; color: #666; text-align: center; }
    #status.success { display: block; background: rgba(80,200,120,0.1); color: #50c878; border: 1px solid rgba(80,200,120,0.2); }
    #status.error { display: block; background: rgba(255,80,80,0.1); color: #ff5050; border: 1px solid rgba(255,80,80,0.2); }
    #status.error .btn-config { display: inline-block; background: #e8e8ee; color: #666; border: none; border-radius: 4px; cursor: pointer; }
    #status.error .btn-config:hover { background: #ddd; color: #444; }
    .loading-pulse { animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .empty { color: #999; font-size: 11px; padding: 4px 0; }
    .no-config {
      text-align: center;
      padding: 20px 0;
    }
    .no-config p { font-size: 12px; color: #888; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h2><span class="logo-link" id="logoLink"><span>Scalefish</span></span> 书签</h2>

  <div id="unconfigured" class="no-config" style="display:none">
    <p>请先配置后端地址和 Token</p>
    <button class="btn-config" id="goConfigBtn" style="flex:none;padding:8px 16px">打开设置</button>
  </div>

  <div id="mainForm">
    <div class="field">
      <label>标题</label>
      <div class="input-like" id="pageTitle">-</div>
    </div>
    <div class="field">
      <label>URL</label>
      <div class="input-like url-box" id="pageUrl">-</div>
    </div>
    <div class="field">
      <label>分类</label>
      <select id="categorySelect">
        <option value="">不选择</option>
      </select>
    </div>
    <div class="field">
      <label>标签</label>
      <div id="tagList" class="tags"></div>
    </div>
    <div class="actions">
      <button class="btn-save" id="saveBtn">保存书签</button>
      <button class="btn-config" id="configBtn">设置</button>
    </div>
  </div>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
